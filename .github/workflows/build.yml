name: Build Flipper Firmware

on:
  schedule:
    - cron: 0 0 * * *
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Configure firmwares
    runs-on: ubuntu-latest
    outputs:
      firmwares: ${{ steps.config.outputs.firmwares }}
    steps:
      - id: config
        run: |
          FIRMWARES=$(jq -c . <<'EOF'
          [
            {"name": "Official",    "repo": "flipperdevices/flipperzero-firmware",      "channel": "dev"},
            {"name": "Unleashed",   "repo": "DarkFlippers/unleashed-firmware",          "channel": "Unleashed"},
            {"name": "RogueMaster", "repo": "RogueMaster/flipperzero-firmware-wPlugins","channel": "RogueMaster"}
          ]
          EOF
          )
          echo "firmwares=$FIRMWARES" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.firmware.name }} Firmware
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        firmware: ${{ fromJSON(needs.setup.outputs.firmwares) }}
      fail-fast: false
    steps:
      - name: Checkout this repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Checkout Firmware
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.firmware.repo }}
          path: firmware
      - name: Build firmware
        id: build
        working-directory: firmware
        run: |-
          DATE=`date +%m%d`
          TIME=`date +%H%M`
          COMMIT=$(git rev-parse --short HEAD)

          ./fbt updater_package COMPACT=1 DEBUG=0 DIST_SUFFIX=$COMMIT

          NAME="${{ matrix.firmware.name }}-$DATE-$TIME-$COMMIT"
          mv dist/f7-C/f7-update-$COMMIT "$NAME"
          tar -czf "$NAME.tgz" "$NAME"
          echo "name=$NAME" > $GITHUB_OUTPUT
      - name: Upload tgz
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.firmware.name }}
          path: firmware/${{ steps.build.outputs.name }}.tgz

  consolidate:
    name: Consolidate firmwares
    needs: [setup, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: firmwares
      - name: Copy firmware bundles
        run: |
          mkdir output
          cp -R firmwares/*/* output/
      - name: Build template inputs
        id: variables
        env:
          FIRMWARES_INPUT: ${{ needs.setup.outputs.firmwares }}
        run: |
          ENRICHED='[]'
          while IFS= read -r row; do
            name=$(echo "$row" | jq -r '.name')
            filename=$(ls output/${name}-*.tgz | head -n1 | cut -f2 -d'/')
            version=$(echo "$filename" | cut -f1 -d'.' | cut -d'-' -f2-4)
            ENRICHED=$(echo "$ENRICHED" | jq -c \
              --argjson item "$row" \
              --arg fn "$filename" \
              --arg ver "$version" \
              '. + [{Name: $item.name, Repo: $item.repo, Channel: $item.channel, Filename: $fn, Version: $ver}]')
          done < <(echo "$FIRMWARES_INPUT" | jq -c '.[]')

          echo "Firmwares=$ENRICHED" >> $GITHUB_OUTPUT
          echo "Timestamp=$(date '+%Y-%m-%d %H:%M %Z')" >> $GITHUB_OUTPUT

      - uses: badsyntax/github-action-render-template@710c485d6c34904bb78f891c078103015584203d # v1.0.1
        name: Render Index
        id: render-template
        with:
          template: "static/index.html.hbs"
          inputs: |
            {
              "Firmwares": ${{ steps.variables.outputs.Firmwares }},
              "Timestamp": "${{ steps.variables.outputs.Timestamp }}"
            }

      - name: Output Rendered Template
        run: |
          echo "$OUTPUT" > output/index.html
        env:
          OUTPUT: ${{ steps.render-template.outputs.result }}

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: output

  deploy:
    name: Deploy firmwares to Github Pages
    runs-on: ubuntu-latest
    needs: consolidate
    if: github.event_name != 'pull_request'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
